server {
    server_name botscan.app www.botscan.app;

    location = /terms {
        default_type text/html;
        alias /var/www/BotScan/static/terms.html;
    }

    location = /privacy {
        default_type text/html;
        alias /var/www/BotScan/static/privacy.html;
    }

    location = /refund {
        default_type text/html;
        alias /var/www/BotScan/static/refund.html;
    }

    location /webhook {
        proxy_pass http://localhost:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/botscan.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/botscan.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.botscan.app) {
        return 301 https://$host$request_uri;
    }

    if ($host = botscan.app) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name botscan.app www.botscan.app;
    return 404;
}